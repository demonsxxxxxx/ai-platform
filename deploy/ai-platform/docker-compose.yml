version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ai_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - ai_platform_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_platform} -d ${POSTGRES_DB:-ai_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-63799}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ai_platform_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ai-platform-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ai_platform_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_API_PORT:-9009}:9000"
      - "${MINIO_CONSOLE_PORT:-9010}:9001"
    volumes:
      - ai_platform_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${AI_PLATFORM_IMAGE:-ai-platform:local}
    build:
      context: ../..
    container_name: ai-platform-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_platform}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_platform}
      DATABASE_POOL_MIN_SIZE: ${DATABASE_POOL_MIN_SIZE:-1}
      DATABASE_POOL_MAX_SIZE: ${DATABASE_POOL_MAX_SIZE:-10}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-10}
      DATABASE_POOL_MAX_WAITING: ${DATABASE_POOL_MAX_WAITING:-100}
      DATABASE_POOL_CLOSE_TIMEOUT_SECONDS: ${DATABASE_POOL_CLOSE_TIMEOUT_SECONDS:-5}
      QUEUE_TENANT_PROCESSING_LIMIT: ${QUEUE_TENANT_PROCESSING_LIMIT:-0}
      QUEUE_USER_PROCESSING_LIMIT: ${QUEUE_USER_PROCESSING_LIMIT:-0}
      QUEUE_LEASE_SCAN_LIMIT: ${QUEUE_LEASE_SCAN_LIMIT:-50}
      QUEUE_INSIGHT_SCAN_LIMIT: ${QUEUE_INSIGHT_SCAN_LIMIT:-500}
      QUEUE_LEASE_VISIBILITY_TIMEOUT_SECONDS: ${QUEUE_LEASE_VISIBILITY_TIMEOUT_SECONDS:-900}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-ai_platform_minio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-ai-platform-artifacts}
      RUNTIME_211_BASE_URL: ${RUNTIME_211_BASE_URL:-}
      TRUSTED_PRINCIPAL_SECRET: ${TRUSTED_PRINCIPAL_SECRET:?set TRUSTED_PRINCIPAL_SECRET}
      FRONTEND_POC_AUTH_ENABLED: ${FRONTEND_POC_AUTH_ENABLED:-false}
      EXISTING_AUTH_BASE_URL: ${EXISTING_AUTH_BASE_URL:-http://10.56.0.25:7263}
      EXISTING_USER_INFO_BASE_URL: ${EXISTING_USER_INFO_BASE_URL:-http://10.56.0.25:5166}
      EXISTING_AUTH_TIMEOUT_SECONDS: ${EXISTING_AUTH_TIMEOUT_SECONDS:-15}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:9527,http://127.0.0.1:9527,http://10.56.0.211:8080,http://10.56.0.211:18001}
      AI_SESSION_SECRET: ${AI_SESSION_SECRET:?set AI_SESSION_SECRET}
      AI_SESSION_COOKIE_NAME: ${AI_SESSION_COOKIE_NAME:-ai_platform_session}
      AI_SESSION_COOKIE_SECURE: ${AI_SESSION_COOKIE_SECURE:-false}
      AI_SESSION_MAX_AGE_SECONDS: ${AI_SESSION_MAX_AGE_SECONDS:-28800}
      LLM_GATEWAY_PROVIDER: ${LLM_GATEWAY_PROVIDER:-openai_compatible}
      MODEL_GATEWAY_REQUEST_CONCURRENCY_LIMIT: ${MODEL_GATEWAY_REQUEST_CONCURRENCY_LIMIT:-0}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-deepseek-v4-flash}
      CLAUDE_AGENT_MODEL: ${CLAUDE_AGENT_MODEL:-deepseek-v4-flash}
      CLAUDE_AGENT_SDK_ENABLED: ${CLAUDE_AGENT_SDK_ENABLED:-false}
      CLAUDE_AGENT_SDK_TIMEOUT_SECONDS: ${CLAUDE_AGENT_SDK_TIMEOUT_SECONDS:-120}
      CLAUDE_AGENT_SDK_MAX_TURNS: ${CLAUDE_AGENT_SDK_MAX_TURNS:-128}
      CLAUDE_AGENT_SDK_EFFORT: ${CLAUDE_AGENT_SDK_EFFORT:-xhigh}
      CLAUDE_AGENT_SDK_MAX_THINKING_TOKENS: ${CLAUDE_AGENT_SDK_MAX_THINKING_TOKENS:-16384}
      CLAUDE_AGENT_PERMISSION_MODE: ${CLAUDE_AGENT_PERMISSION_MODE:-dontAsk}
      CLAUDE_AGENT_ALLOWED_TOOLS: ${CLAUDE_AGENT_ALLOWED_TOOLS:-Read,Glob,LS}
      CLAUDE_AGENT_DISALLOWED_TOOLS: ${CLAUDE_AGENT_DISALLOWED_TOOLS-Write,Edit,NotebookEdit}
      CLAUDE_AGENT_WORKSPACE_ROOT: ${CLAUDE_AGENT_WORKSPACE_ROOT:-/tmp/ai-platform-agent-workspaces}
      CLAUDE_AGENT_SDK_SKILLS: ${CLAUDE_AGENT_SDK_SKILLS:-general-chat,qa-file-reviewer,baoyu-translate}
      RAGFLOW_API_URL: ${RAGFLOW_API_URL:-}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}
      RAGFLOW_DEFAULT_DATASET_ID: ${RAGFLOW_DEFAULT_DATASET_ID:-}
      RAGFLOW_TIMEOUT_SECONDS: ${RAGFLOW_TIMEOUT_SECONDS:-30}
      RAGFLOW_TOP_K: ${RAGFLOW_TOP_K:-3}
      RAGFLOW_SIMILARITY_THRESHOLD: ${RAGFLOW_SIMILARITY_THRESHOLD:-0.2}
      SANDBOX_CONTAINER_PROVIDER: ${SANDBOX_CONTAINER_PROVIDER:-fake}
      SANDBOX_EXECUTOR_IMAGE: ${SANDBOX_EXECUTOR_IMAGE:-ai-platform:local}
      SANDBOX_EXECUTOR_PUBLISHED_HOST: ${SANDBOX_EXECUTOR_PUBLISHED_HOST:-host.docker.internal}
      SANDBOX_CALLBACK_BASE_URL: ${SANDBOX_CALLBACK_BASE_URL:-http://10.56.0.211:8020}
      SANDBOX_CALLBACK_TOKEN: ${SANDBOX_CALLBACK_TOKEN:?set SANDBOX_CALLBACK_TOKEN}
      SANDBOX_WORKSPACE_ROOT: ${SANDBOX_WORKSPACE_ROOT:-/tmp/ai-platform-sandbox-workspaces}
      SANDBOX_CONTAINER_START_TIMEOUT_SECONDS: ${SANDBOX_CONTAINER_START_TIMEOUT_SECONDS:-30}
      SANDBOX_EXECUTOR_HEALTH_TIMEOUT_SECONDS: ${SANDBOX_EXECUTOR_HEALTH_TIMEOUT_SECONDS:-60}
    ports:
      - "${AI_PLATFORM_API_PORT:-8020}:8020"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ai_platform_sandbox_workspaces:/tmp/ai-platform-sandbox-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    image: ${AI_PLATFORM_IMAGE:-ai-platform:local}
    build:
      context: ../..
    container_name: ai-platform-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker_main"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_platform}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_platform}
      DATABASE_POOL_MIN_SIZE: ${DATABASE_POOL_MIN_SIZE:-1}
      DATABASE_POOL_MAX_SIZE: ${DATABASE_POOL_MAX_SIZE:-10}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-10}
      DATABASE_POOL_MAX_WAITING: ${DATABASE_POOL_MAX_WAITING:-100}
      DATABASE_POOL_CLOSE_TIMEOUT_SECONDS: ${DATABASE_POOL_CLOSE_TIMEOUT_SECONDS:-5}
      QUEUE_TENANT_PROCESSING_LIMIT: ${QUEUE_TENANT_PROCESSING_LIMIT:-0}
      QUEUE_USER_PROCESSING_LIMIT: ${QUEUE_USER_PROCESSING_LIMIT:-0}
      QUEUE_LEASE_SCAN_LIMIT: ${QUEUE_LEASE_SCAN_LIMIT:-50}
      QUEUE_INSIGHT_SCAN_LIMIT: ${QUEUE_INSIGHT_SCAN_LIMIT:-500}
      QUEUE_LEASE_VISIBILITY_TIMEOUT_SECONDS: ${QUEUE_LEASE_VISIBILITY_TIMEOUT_SECONDS:-900}
      WORKER_MAINTENANCE_INTERVAL_SECONDS: ${WORKER_MAINTENANCE_INTERVAL_SECONDS:-30}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-ai_platform_minio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-ai-platform-artifacts}
      RUNTIME_211_BASE_URL: ${RUNTIME_211_BASE_URL:-}
      TRUSTED_PRINCIPAL_SECRET: ${TRUSTED_PRINCIPAL_SECRET:?set TRUSTED_PRINCIPAL_SECRET}
      FRONTEND_POC_AUTH_ENABLED: ${FRONTEND_POC_AUTH_ENABLED:-false}
      EXISTING_AUTH_BASE_URL: ${EXISTING_AUTH_BASE_URL:-http://10.56.0.25:7263}
      EXISTING_USER_INFO_BASE_URL: ${EXISTING_USER_INFO_BASE_URL:-http://10.56.0.25:5166}
      EXISTING_AUTH_TIMEOUT_SECONDS: ${EXISTING_AUTH_TIMEOUT_SECONDS:-15}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:9527,http://127.0.0.1:9527,http://10.56.0.211:8080,http://10.56.0.211:18001}
      AI_SESSION_SECRET: ${AI_SESSION_SECRET:?set AI_SESSION_SECRET}
      AI_SESSION_COOKIE_NAME: ${AI_SESSION_COOKIE_NAME:-ai_platform_session}
      AI_SESSION_COOKIE_SECURE: ${AI_SESSION_COOKIE_SECURE:-false}
      AI_SESSION_MAX_AGE_SECONDS: ${AI_SESSION_MAX_AGE_SECONDS:-28800}
      MEMORY_RETENTION_WORKER_CLEANUP_ENABLED: ${MEMORY_RETENTION_WORKER_CLEANUP_ENABLED:-true}
      MEMORY_RETENTION_WORKER_CLEANUP_INTERVAL_SECONDS: ${MEMORY_RETENTION_WORKER_CLEANUP_INTERVAL_SECONDS:-300}
      MEMORY_RETENTION_WORKER_CLEANUP_LIMIT: ${MEMORY_RETENTION_WORKER_CLEANUP_LIMIT:-200}
      MULTI_AGENT_DISPATCH_WORKER_ENABLED: ${MULTI_AGENT_DISPATCH_WORKER_ENABLED:-false}
      MULTI_AGENT_DISPATCH_WORKER_INTERVAL_SECONDS: ${MULTI_AGENT_DISPATCH_WORKER_INTERVAL_SECONDS:-30}
      MULTI_AGENT_DISPATCH_WORKER_LIMIT: ${MULTI_AGENT_DISPATCH_WORKER_LIMIT:-1}
      MULTI_AGENT_DISPATCH_WORKER_USER_ID: ${MULTI_AGENT_DISPATCH_WORKER_USER_ID:-system:multi-agent-dispatcher}
      LLM_GATEWAY_PROVIDER: ${LLM_GATEWAY_PROVIDER:-openai_compatible}
      MODEL_GATEWAY_REQUEST_CONCURRENCY_LIMIT: ${MODEL_GATEWAY_REQUEST_CONCURRENCY_LIMIT:-0}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-deepseek-v4-flash}
      CLAUDE_AGENT_MODEL: ${CLAUDE_AGENT_MODEL:-deepseek-v4-flash}
      CLAUDE_AGENT_SDK_ENABLED: ${CLAUDE_AGENT_SDK_ENABLED:-false}
      CLAUDE_AGENT_SDK_TIMEOUT_SECONDS: ${CLAUDE_AGENT_SDK_TIMEOUT_SECONDS:-120}
      CLAUDE_AGENT_SDK_MAX_TURNS: ${CLAUDE_AGENT_SDK_MAX_TURNS:-128}
      CLAUDE_AGENT_SDK_EFFORT: ${CLAUDE_AGENT_SDK_EFFORT:-xhigh}
      CLAUDE_AGENT_SDK_MAX_THINKING_TOKENS: ${CLAUDE_AGENT_SDK_MAX_THINKING_TOKENS:-16384}
      CLAUDE_AGENT_PERMISSION_MODE: ${CLAUDE_AGENT_PERMISSION_MODE:-dontAsk}
      CLAUDE_AGENT_ALLOWED_TOOLS: ${CLAUDE_AGENT_ALLOWED_TOOLS:-Read,Glob,LS}
      CLAUDE_AGENT_DISALLOWED_TOOLS: ${CLAUDE_AGENT_DISALLOWED_TOOLS-Write,Edit,NotebookEdit}
      CLAUDE_AGENT_WORKSPACE_ROOT: ${CLAUDE_AGENT_WORKSPACE_ROOT:-/tmp/ai-platform-agent-workspaces}
      CLAUDE_AGENT_SDK_SKILLS: ${CLAUDE_AGENT_SDK_SKILLS:-general-chat,qa-file-reviewer,baoyu-translate}
      RAGFLOW_API_URL: ${RAGFLOW_API_URL:-}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}
      RAGFLOW_DEFAULT_DATASET_ID: ${RAGFLOW_DEFAULT_DATASET_ID:-}
      RAGFLOW_TIMEOUT_SECONDS: ${RAGFLOW_TIMEOUT_SECONDS:-30}
      RAGFLOW_TOP_K: ${RAGFLOW_TOP_K:-3}
      RAGFLOW_SIMILARITY_THRESHOLD: ${RAGFLOW_SIMILARITY_THRESHOLD:-0.2}
      SANDBOX_CONTAINER_PROVIDER: ${SANDBOX_CONTAINER_PROVIDER:-fake}
      SANDBOX_EXECUTOR_IMAGE: ${SANDBOX_EXECUTOR_IMAGE:-ai-platform:local}
      SANDBOX_EXECUTOR_PUBLISHED_HOST: ${SANDBOX_EXECUTOR_PUBLISHED_HOST:-host.docker.internal}
      SANDBOX_CALLBACK_BASE_URL: ${SANDBOX_CALLBACK_BASE_URL:-http://10.56.0.211:8020}
      SANDBOX_CALLBACK_TOKEN: ${SANDBOX_CALLBACK_TOKEN:?set SANDBOX_CALLBACK_TOKEN}
      SANDBOX_WORKSPACE_ROOT: ${SANDBOX_WORKSPACE_ROOT:-/tmp/ai-platform-sandbox-workspaces}
      SANDBOX_CONTAINER_START_TIMEOUT_SECONDS: ${SANDBOX_CONTAINER_START_TIMEOUT_SECONDS:-30}
      SANDBOX_EXECUTOR_HEALTH_TIMEOUT_SECONDS: ${SANDBOX_EXECUTOR_HEALTH_TIMEOUT_SECONDS:-60}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ai_platform_sandbox_workspaces:/tmp/ai-platform-sandbox-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  ai_platform_postgres:
  ai_platform_redis:
  ai_platform_minio:
  ai_platform_sandbox_workspaces:
