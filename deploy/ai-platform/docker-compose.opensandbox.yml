services:
  api:
    environment:
      SANDBOX_CONTAINER_PROVIDER: opensandbox
      SANDBOX_EGRESS_POLICY_ENABLED: "false"
      OPENSANDBOX_EXTERNAL_EGRESS_CALLBACK_BASE_URL: ${OPENSANDBOX_EXTERNAL_EGRESS_CALLBACK_BASE_URL:?set OPENSANDBOX_EXTERNAL_EGRESS_CALLBACK_BASE_URL}
      OPENSANDBOX_EXTERNAL_EGRESS_OPENAI_BASE_URL: ${OPENSANDBOX_EXTERNAL_EGRESS_OPENAI_BASE_URL:?set OPENSANDBOX_EXTERNAL_EGRESS_OPENAI_BASE_URL}
      OPENSANDBOX_EXTERNAL_EGRESS_ANTHROPIC_BASE_URL: ${OPENSANDBOX_EXTERNAL_EGRESS_ANTHROPIC_BASE_URL:?set OPENSANDBOX_EXTERNAL_EGRESS_ANTHROPIC_BASE_URL}

  worker:
    environment:
      SANDBOX_CONTAINER_PROVIDER: opensandbox
      SANDBOX_EGRESS_POLICY_ENABLED: "false"
      OPENSANDBOX_EXTERNAL_EGRESS_CALLBACK_BASE_URL: ${OPENSANDBOX_EXTERNAL_EGRESS_CALLBACK_BASE_URL:?set OPENSANDBOX_EXTERNAL_EGRESS_CALLBACK_BASE_URL}
      OPENSANDBOX_EXTERNAL_EGRESS_OPENAI_BASE_URL: ${OPENSANDBOX_EXTERNAL_EGRESS_OPENAI_BASE_URL:?set OPENSANDBOX_EXTERNAL_EGRESS_OPENAI_BASE_URL}
      OPENSANDBOX_EXTERNAL_EGRESS_ANTHROPIC_BASE_URL: ${OPENSANDBOX_EXTERNAL_EGRESS_ANTHROPIC_BASE_URL:?set OPENSANDBOX_EXTERNAL_EGRESS_ANTHROPIC_BASE_URL}

  frontend:
    environment:
      NGINX_ENVSUBST_TEMPLATE_DIR: /etc/nginx/templates-opensandbox
      AI_PLATFORM_S72_BRIDGE_SERVER_NAME: ${AI_PLATFORM_S72_BRIDGE_SERVER_NAME:?set AI_PLATFORM_S72_BRIDGE_SERVER_NAME}
      AI_PLATFORM_S72_BRIDGE_PORT: ${AI_PLATFORM_S72_BRIDGE_PORT:-18443}
      AI_PLATFORM_S72_BRIDGE_ALLOWED_SOURCE_IP: ${AI_PLATFORM_S72_BRIDGE_ALLOWED_SOURCE_IP:?set AI_PLATFORM_S72_BRIDGE_ALLOWED_SOURCE_IP}
    ports:
      - "${AI_PLATFORM_S72_BRIDGE_PORT:-18443}:8443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${AI_PLATFORM_S72_BRIDGE_TLS_CERT_FILE:?set AI_PLATFORM_S72_BRIDGE_TLS_CERT_FILE}:/etc/nginx/s72-bridge/tls/fullchain.pem:ro"
      - "${AI_PLATFORM_S72_BRIDGE_TLS_KEY_FILE:?set AI_PLATFORM_S72_BRIDGE_TLS_KEY_FILE}:/etc/nginx/s72-bridge/tls/privkey.pem:ro"
