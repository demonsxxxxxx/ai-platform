name: ai-platform backend

on:
  pull_request:
    paths:
      - "app/runtime/sandbox/**"
      - "app/routes/sandbox_runtime_cleanup.py"
      - "app/settings.py"
      - "app/b2_sandbox_readiness.py"
      - "app/capacity_baseline.py"
      - "app/governance_readiness.py"
      - "app/observability_readiness.py"
      - "app/repositories.py"
      - "deploy/ai-platform/.env.example"
      - "deploy/ai-platform/docker-compose.yml"
      - "docs/operations/opensandbox-provider-phase-status.md"
      - "pyproject.toml"
      - "scripts/generate_sandbox_runtime_evidence_211.py"
      - "scripts/verify_sandbox_runtime_211.py"
      - "tests/test_b2_sandbox_readiness.py"
      - "tests/test_repositories.py"
      - "tests/test_sandbox_*.py"
      - ".github/workflows/ai-platform-backend.yml"
  push:
    branches:
      - main
    paths:
      - "app/runtime/sandbox/**"
      - "app/routes/sandbox_runtime_cleanup.py"
      - "app/settings.py"
      - "app/b2_sandbox_readiness.py"
      - "app/capacity_baseline.py"
      - "app/governance_readiness.py"
      - "app/observability_readiness.py"
      - "app/repositories.py"
      - "deploy/ai-platform/.env.example"
      - "deploy/ai-platform/docker-compose.yml"
      - "docs/operations/opensandbox-provider-phase-status.md"
      - "pyproject.toml"
      - "scripts/generate_sandbox_runtime_evidence_211.py"
      - "scripts/verify_sandbox_runtime_211.py"
      - "tests/test_b2_sandbox_readiness.py"
      - "tests/test_repositories.py"
      - "tests/test_sandbox_*.py"
      - ".github/workflows/ai-platform-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sandbox-provider:
    name: sandbox provider targeted checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import subprocess
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              pyproject = tomllib.load(handle)

          dependencies = pyproject["project"]["dependencies"]
          dependencies.extend(pyproject["project"]["optional-dependencies"]["test"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", *dependencies])
          PY

      - name: Compile backend sources
        run: python -m compileall -q app tools scripts

      - name: Run sandbox provider targeted tests
        run: |
          python -m pytest \
            tests/test_sandbox_container_provider.py \
            tests/test_sandbox_runtime.py \
            tests/test_sandbox_runtime_cleanup.py \
            tests/test_sandbox_runtime_211_script.py \
            tests/test_b2_sandbox_readiness.py \
            tests/test_repositories.py \
            -q \
            --basetemp .pytest-tmp
