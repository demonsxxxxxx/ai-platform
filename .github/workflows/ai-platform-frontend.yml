name: ai-platform frontend

on:
  pull_request:
    paths:
      - "frontend/web/**"
      - "docs/frontend/**"
      - "deploy/ai-platform/docker-compose.frontend.yml"
      - "tests/test_frontend_*.py"
      - "tools/frontend_projection_audit.py"
      - "tools/frontend_release_traceability.py"
      - ".github/workflows/ai-platform-frontend.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/web/**"
      - "docs/frontend/**"
      - "deploy/ai-platform/docker-compose.frontend.yml"
      - "tests/test_frontend_*.py"
      - "tools/frontend_projection_audit.py"
      - "tools/frontend_release_traceability.py"
      - ".github/workflows/ai-platform-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: projection audit, lint, build, trace
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend/web
        run: corepack pnpm install --frozen-lockfile

      - name: Verify frontend projection and build
        working-directory: frontend/web
        run: corepack pnpm run ci:verify

      - name: Record frontend release traceability
        run: python tools/frontend_release_traceability.py --format json

  frontend-image:
    name: packaged image build
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            --build-arg AI_PLATFORM_BUILD_COMMIT=${{ github.sha }} \
            --build-arg AI_PLATFORM_BUILD_DIRTY=false \
            -t ai-platform-frontend:${{ github.sha }} \
            -f frontend/web/Dockerfile \
            .

      - name: Verify image build provenance
        run: |
          docker run --rm --entrypoint cat ai-platform-frontend:${{ github.sha }} /usr/share/nginx/html/ai-platform-build-provenance.json > frontend-build-provenance.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          provenance = json.loads(Path("frontend-build-provenance.json").read_text(encoding="utf-8"))
          assert provenance["git"]["commit"] == os.getenv("GITHUB_SHA")
          assert provenance["git"]["dirty"] is False
          assert provenance["frontend_path"] == "frontend/web"
          PY
