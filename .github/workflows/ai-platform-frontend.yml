name: ai-platform frontend

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: projection audit, lint, build, trace
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend/web
        run: corepack pnpm install --frozen-lockfile

      - name: Install Python test dependencies
        run: python -m pip install pytest pyyaml

      - name: Verify static frontend Python contracts
        run: python -m pytest tests/test_deploy_frontend_static.py tests/test_frontend_release_traceability.py tests/test_frontend_packaged_runtime_smoke.py tests/test_frontend_ci_workflow.py tests/test_backend_ci_workflow.py tests/test_release_authority.py tests/test_runtime_launch_script.py tests/test_source_authority_docs.py -q --basetemp .pytest-tmp

      - name: Verify static frontend deploy helper
        run: python tools/deploy_frontend_static.py --help

      - name: Verify frontend projection and build
        working-directory: frontend/web
        run: corepack pnpm run ci:verify

      - name: Record frontend release traceability
        run: python tools/frontend_release_traceability.py --format json

      - name: Record packaged frontend runtime smoke contract
        run: python tools/frontend_packaged_runtime_smoke.py --format json

  frontend-image:
    name: packaged image build
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            --build-arg AI_PLATFORM_BUILD_COMMIT=${{ github.sha }} \
            --build-arg AI_PLATFORM_BUILD_DIRTY=false \
            -t ai-platform-frontend:${{ github.sha }} \
            -f frontend/web/Dockerfile \
            .

      - name: Verify image build provenance
        run: |
          docker run --rm --entrypoint cat ai-platform-frontend:${{ github.sha }} /usr/share/nginx/html/ai-platform-build-provenance.json > frontend-build-provenance.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          provenance = json.loads(Path("frontend-build-provenance.json").read_text(encoding="utf-8"))
          assert provenance["git"]["commit"] == os.getenv("GITHUB_SHA")
          assert provenance["git"]["dirty"] is False
          assert provenance["frontend_path"] == "frontend/web"
          PY

  required:
    name: frontend required
    runs-on: ubuntu-latest
    needs: [frontend, frontend-image]
    if: ${{ always() }}
    steps:
      - name: Require frontend verification and image provenance
        env:
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          IMAGE_RESULT: ${{ needs.frontend-image.result }}
        run: |
          test "$FRONTEND_RESULT" = "success"
          test "$IMAGE_RESULT" = "success"
