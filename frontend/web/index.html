    <!-- Inline critical CSS for flash-of-unstyled-content prevention -->
    <style>
      :root {
        --boot-theme-primary: #78716c;
        --boot-theme-border: #e7e5e4;
        --boot-theme-bg: #eef2f6;
      }

      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      /* Prevent FOUC - match the app shell background immediately */
      html,
      body {
        background-color: var(--boot-theme-bg);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --boot-theme-primary: #a8a29e;
          --boot-theme-border: #44403c;
          --boot-theme-bg: #151210;
        }
      }

      /* Show loading indicator while JS loads */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        position: relative;
      }

      #root:empty::before,
      #root:empty::after {
        content: "";
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      #root:empty::before {
        border: 2px solid var(--boot-theme-border);
      }

      #root:empty::after {
        border: 2px solid transparent;
        border-top-color: var(--boot-theme-primary);
        animation: lc-spin 0.6s linear infinite;
        will-change: transform;
      }

      @keyframes lc-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (() => {
        const lightColor = "#eef2f6";
        const darkColor = "#151210";
        const storageKey = "ai-platform-theme";
        const legacyStorageKey = "lamb-agent-theme";
        const storedTheme =
          localStorage.getItem(storageKey) ||
          localStorage.getItem(legacyStorageKey);
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        const theme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : prefersDark
              ? "dark"
              : "light";
        const color = theme === "dark" ? darkColor : lightColor;
        const themeColors = document.querySelectorAll(
          'meta[name="theme-color"]',
        );
        const statusBar = document.getElementById("apple-status-bar-style");
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.style.backgroundColor = color;
        document.documentElement.style.colorScheme = theme;
        document.body.style.backgroundColor = color;
        document.body.style.colorScheme = theme;
        themeColors.forEach((themeColor) => {
          themeColor.setAttribute("content", color);
        });
        statusBar?.setAttribute(
          "content",
          theme === "dark" ? "black" : "default",
        );
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
