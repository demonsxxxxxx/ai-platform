<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Platform controlled execution cabin illustration</title>
  <desc id="desc">A sparse Ian Xiaohei style hand-drawn architecture illustration for the ai-platform repository.</desc>
  <defs>
    <style>
      .ink { fill: none; stroke: #111; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #111; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .orange { fill: none; stroke: #f2992e; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .red { fill: none; stroke: #d33a2c; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; }
      .blue { fill: none; stroke: #2f80c9; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: "KaiTi", "STKaiti", "Microsoft YaHei", sans-serif; font-size: 31px; fill: #111; }
      .label-small { font-family: "KaiTi", "STKaiti", "Microsoft YaHei", sans-serif; font-size: 24px; fill: #111; }
      .label-blue { font-family: "KaiTi", "STKaiti", "Microsoft YaHei", sans-serif; font-size: 24px; fill: #2f80c9; }
      .label-red { font-family: "KaiTi", "STKaiti", "Microsoft YaHei", sans-serif; font-size: 24px; fill: #d33a2c; }
      .label-orange { font-family: "KaiTi", "STKaiti", "Microsoft YaHei", sans-serif; font-size: 25px; fill: #f2992e; }
      .paper { fill: #fff; stroke: #111; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .xiaohei { fill: #111; stroke: #111; stroke-width: 3; stroke-linejoin: round; }
    </style>
    <marker id="arrow-orange" markerWidth="15" markerHeight="15" refX="11" refY="7.5" orient="auto">
      <path d="M1 1 L12 7.5 L1 14" fill="none" stroke="#f2992e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L11 7 L1 13" fill="none" stroke="#2f80c9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

