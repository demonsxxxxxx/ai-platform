<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ai-platform architecture illustration</title>
  <desc id="desc">A sparse hand-drawn style architecture illustration showing ai-platform as the central governed switchboard.</desc>
  <defs>
    <style>
      .ink { fill: none; stroke: #111; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #111; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .orange { fill: none; stroke: #f28c28; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .red { fill: none; stroke: #e13b2d; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; }
      .blue { fill: none; stroke: #2878c8; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: "KaiTi", "STKaiti", "Microsoft YaHei", sans-serif; font-size: 34px; fill: #111; letter-spacing: 1px; }
      .small { font-size: 28px; }
      .redText { fill: #e13b2d; }
      .blueText { fill: #2878c8; }
      .xiaohei { fill: #111; stroke: #111; stroke-width: 4; }
      .eye { fill: #fff; stroke: none; }
      .paper { fill: #fff; stroke: #111; stroke-width: 4; stroke-linejoin: round; }
      .wash { fill: #fff; }
    </style>
    <marker id="arrowOrange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#f28c28" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="wash" x="0" y="0" width="1600" height="900"/>

  <!-- left input -->
