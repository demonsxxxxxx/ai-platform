  <path class="thin" d="M178 358c-4 38-8 75-12 112"/>
  <path class="thin" d="M146 412c30 2 61 4 92 4"/>
  <path class="thin" d="M160 470c-18 27-37 53-55 79"/>
  <path class="thin" d="M187 470c19 29 39 57 61 84"/>
  <path class="thin" d="M250 247c38-23 84-18 107 8 21 25 19 61-9 82-25 20-65 19-96 7l-42 23 17-44c-18-23-10-56 23-76z"/>
